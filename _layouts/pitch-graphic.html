  <h1 class="page-heading">{{ page.title }}</h1>

  <a href="{{ site.baseurl }}{% link pitch_editor.md %}">
      <button class="pitch-btn">Pitch Editor</button>
  </a>

</div>
{{ content }}

  <p id="dateDisplay" style="font-size:14px; padding-left: 8px; margin-top: -15px"></p>




<div class="pitch-viz-wrapper" >
  <!-- Top info panel -->
  <div class="pitch-info-top">
      <div id="output"></div>
    </div>


  <!-- Main viz row -->
  <div class="pitch-viz-container">
    <div class="left-column">
      <div class="pitch_info_wrapper">
        <div id="dynamic-output"></div>
      </div>

      <div class="spin-axis-wrapper">
         <!-- <div id="spin_axis_plot"></div> -->
          <div class="spin-axis-title">Spin Axis (Catcher POV)</div>
         <canvas id="spin_axis_plot"></canvas>
      </div>


 

    </div>

 <div class="plot-wrapper">
  <!-- <div id="plot"></div> -->
  <canvas id="plot"></canvas>

    <div class="plot-legend">
      <div><span style="color:black;">●</span> With Spin</div>
      <div><span style="color:rgba(0, 0, 0, 0.33);">●</span> Without Spin</div>
    </div>


  <!-- Camera button bottom-left -->
  <button id="cameraButtonId" class="camera-button">Reposition Camera</button>
</div>



  </div>
</div>
